version: '2.1.0'
changelog: |-
  :tada: New features and improvements
  ------------------------------------
  + fix(music): populate album duration on sync (#1147) @kontell
  + Decouple segment checking from playback reporting (#1116) @CeruleanRed
  + feat(entrypoint): accept timestamp (#1133) @Rijul-A
  + Add support for TV show trailers (#1138) @bossanova808
  + fix(browse): add sort methods inside collections (#1134) @Rijul-A
  + Add Quick Connect support (#1117) @mkopec
  + Support "GuestStar" person type in TV episode actors (#1111) @ErwinBr

  Bug Fixes
  ---------
  + Honor the cast command's StartPositionTicks as the resume position (#1154) @jeremiahrose
  + Report a track's start position as 0, not the stale player clock (#1153) @jeremiahrose
  + Honor StartIndex in remote Play commands so the selected track plays (#1152) @jeremiahrose
  + Fix: Only transcode with mp4 container when the preferred codec is av1 to avoid seeking failure (#1136) @nkestrel
  + fix(monitor): skip server_instance setup when get_device returns no sessions (#1141) @SAY-5
  + Clamp media segment skip targets before EOF (#1114) @penggongkui-job
  + Fix websocket authentication (#1121) @mcarlton00
  + Fix: Correct missing thumbnails for Guest Star actors in TV Shows (#1124) @ErwinBr
  + fix(player): re-detect audio and subs (#1115) @Rijul-A
  + queries_music: update album title when album updated in jellyfin (#1108) @csaavedra
  + music.py: fix addition of song artist different from album artist (#1107) @csaavedra

  Code or Repo Maintenance
  ------------------------
  + Run the black formatter (#1127) @oddstr13

  CI & build changes
  ------------------
  + Update github/codeql-action action to v4.35.1 (#1120) @[renovate[bot]](https://github.com/apps/renovate)
  + Update codecov/codecov-action action to v6 (#1119) @[renovate[bot]](https://github.com/apps/renovate)
  + Update actions/upload-artifact action to v7 (#1101) @[renovate[bot]](https://github.com/apps/renovate)
  + Update codecov/codecov-action action to v5.5.3 (#1112) @[renovate[bot]](https://github.com/apps/renovate)
  + Update release-drafter/release-drafter action to v6.4.0 (#1102) @[renovate[bot]](https://github.com/apps/renovate)
  + Update github/codeql-action action to v4.34.1 (#1099) @[renovate[bot]](https://github.com/apps/renovate)
dependencies:
  py3:
    - addon: 'xbmc.python'
      version: '3.0.0'
    - addon: 'script.module.requests'
      version: '2.22.0+matrix.1'
    - addon: 'script.module.dateutil'
      version: '2.8.1+matrix.1'
    - addon: 'script.module.addon.signals'
      version: '0.0.5+matrix.1'
    - addon: 'script.module.websocket'
      version: '1.6.4'
    - addon: 'script.module.web-pdb'
      version: '2.0.1'
